name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  validate_pyproject:
    name: Validate pyproject.toml
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        python --version
        python -m venv .venv
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/python -m pip install validate-pyproject[all]

    - name: Validate pyproject.toml
      run: |
        .venv/bin/python -m validate_pyproject -vv pyproject.toml

  lint:
    name: Lint code base
    needs: [validate_pyproject]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies
      run: |
        python --version
        python -m venv .venv
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/python -m pip install --group lint
    - name: Ruff
      run: |
        .venv/bin/python -m ruff check .
    - name: Pylint
      run: |
        .venv/bin/python -m pylint -v --rcfile=pyproject.toml .
    - name: Black
      run: |
        .venv/bin/python -m black -v --check --diff .

  unit_tests:
    name: Run unit tests
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Create venv and install dependencies and project
      run: |
        python --version
        python -m venv .venv
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/python -m pip install --group coverage
        .venv/bin/python -m pip install .

    - name: Unit tests with coverage
      run: |
        export COVERAGE_PROCESS_START="$(pwd)/pyproject.toml"
        .venv/bin/pytest -vra --cov --cov-config=pyproject.toml tests/unit

  unit_tests_self_run:
    name: Run unit tests via pyproject_installer
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies and project
      run: |
        python --version
        # nested venvs are not supported
        python -m pip install --upgrade pip
        python -m pip install --group test
        python -m pip install .

    - name: Unit tests with self run
      run: |
        python -m pyproject_installer -v build
        python -m pyproject_installer -v run -- pytest -vra tests/unit

  integration_tests:
    name: Run integration tests
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Create venv and install dependencies and project
      run: |
        python --version
        python -m venv .venv
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/python -m pip install --group test
        .venv/bin/python -m pip install .

    - name: integration tests
      run: |
        .venv/bin/pytest -vra tests/integration
